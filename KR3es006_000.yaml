front:
  text: 杏林雜話序淺田識此曩著名醫傳輯慶元以降之名醫事迹今又採掇其言行之不足以編其傳者另録之曰杏林雜話乞序於余余謂學術皆原乎漢土故名醫之講學究術亦不可不據漢土也而講究學術之精皇國振古不乏其人則後之有事於醫者宜講漢土醫術而師皇國上世之人哉近世治化之盛也技術日新名醫之治效或有古先所未發者焉雖然講究之術不可以不率由於古先也何則新必原乎故能溫其故然後知其新是以近世名醫之治效無非有所感興於上世者然則此編所載瑣屑零碎之事亦出乎師古講術之餘豈可輕視之耶因思識此之學之才宜若無事於近世醫迹而然也猶綣綣於往迹既編其傳紀又緒餘有如此者乃可以睹其心思之質慤而學術之精確宜矣名聲之嘖嘖於今哉世之炫才逞智者動輒滅裂古法採索珍異怪奇之説欲博一時驚爆之技倆此不溫其故而欲其新之知其騖新驚奇之蔽殆以人命為弄戲可不嘆耶苟使此儕觀此編知事必有其原而學不可期新奇則或有所感發而奮興者乎乃謂之醫路針砭抑亦可矣嗚呼騖新驚奇之蔽豈獨醫哉明治壬申夏四月鶯溪林晄撰杏林雜話序學者生於今日嚮慕先哲風範欲聆其軼事異聞而不可得必有俟博涉遠討之士鉤考而廣記之然後始能想見其人品學術之概是淺田栗園杏林雜話之著所以為不可少也歟栗園夙以善醫聞兼攻文辭嘗著皇國名醫傳以行世又以為各家佳話韻事足啓後學之才識資醫林之考核者匪一則不若此類別為撰録以視學者庶幾足以睹先哲風範矣凡其所登載皆系平生聞見所獲確鑿有據諸傅會悠謬之談一語不闌入矣何其偉歟書既成將付於梓介其友今村祗卿索余題言嘻於老矣無他嗜好每聞人有著述亟請一讀以為樂事斯編之成也既得讀之復加墨簡端其或者可托以行遠歟乃欣然不辭而為之序慶應乙丑夏日海保元備春農書於叩盆舍之南軒
