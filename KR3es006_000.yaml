body:
  text: 杏林雜話余曩撰名醫傳於各家事實遍加採托既而拘於體制不可盡載或一事而其人可見片語而學術可徵者舉皆歸於斯篇名曰杏林雜話南川維遷曰薦野醫員國初京師醫家講素問難經者饗庭東庵為嚆矢至於其門人味岡三伯其學愈盛行井原道閲淺井周璞小川朔庵岡本一抱子皆受其傳教育生徒堀原厚學於朔庵亦與諸子相頡頏此諸人皆以講授為任而不專治療如古林見宜中山三柳北山壽安名古屋玄醫香月牛山等則主治療而兼攻文學故雖同時並行其著書大旨自有徑庭逮古方家出則判然殊途板阪卜齋侍直日神祖手賜韓參卜齋將承以席上越紙俗稱奉書者神祖曰咈以諸候修好之禮物何為妄費卜齋乃脫外套受之神祖意色欣然卜齋與林道春那波道圓陳元贇交厚嘗校針灸聚英及宋人馬仲虎縮年互見圖元贇為之跋極稱其篤志道春又跋其手寫針灸經云余與卜齋挹袖拍肩年久矣我雖不得伊川晦翁草廬之倣佛叟豈不為王期郭長楊載同父之仁術哉其推獎亦至矣堀杏庵慕陶淵明為人常懸其像於壁間曰對此則使人塵念頓消石川丈山送杏庵歸尾陽詩云學養孟軻氣術包盧扁傳林讀耕齋悼杏庵詩云筆評郤正臨洙水藥辨君臣汲上池其學術為識者所欽賞如此元湘中韓使來聘岡本宗什玄治法印接見於京館與白麓東溟青丘輩互相唱酬又治青丘疾有奇功青丘歸寄書謝焉京尹板倉候嘉之為輯其筆語及詩文為三卷以傳於世昔時始舶載醫學正似醫學入門醫方考萬病回春之四部書今大路一溪取正傳古林見宜取入門其所見可以知矣望月鹿門亦好讀正傳云本邦所刻龔氏萬病回春系渡邊幸庵手澤幸庵仕駿府後乘賈舶入清留外二十年而歸住城西大冢卒年一百三歲古林氏世為浪華名醫家藏紀南龍公畫鷹巨幅云其祖見宜進藥有效公嘉之為手寫賜之又有隱元木庵獨立等詩卷皆謝其治隱元病也有京尹板倉候手簡亦為隱元請治之書也正堂宏壯東編有祠堂扁曰見宜堂隱元書也園有連翹樹高數丈亦名種也見宜故宅在浪華懸鐘街南善庵條古林見宜療紀川熊野農夫水腫服藥良久無效乃加青芋於方中又教為朝夕食而愈蓋其人生於山中每以其物為常饌及旅食浪華歷試諸藥禁忌極嚴故脾胃失度藥力不能達所以用方宜之術也享保中見宜有時譽官特命開書院於神田橋門外講醫經於其中使都下醫生聽之後移之於高倉地云高倉即今昌平黌地江州江村左太夫虛羸不食氣息淹淹將絶延林一之進診曰血脈衰弱不絶如縷然猶可僥幸萬一耳乃作劑與之僅用人參一分龍眼肉一個衆皆危之翌朝來診曰證候如前而毛竅稍塞肌膚少和是脾氣旺肺之機尚可望生乃用藥倍前漸漸而差友松子聞之歎賞曰極虛者投大劑純補譬如燈火將熄遽灌油不滅何俟林氏可謂得補法之妙矣名古屋丹水曰林一之進之用方也專主溫補效雖多要不免偏然人有所長則必有所短豈以微瑕舍連城之璧哉戴曼公杭人少學舉子業遊黌舍時雲林龔廷賢年八十餘尚強健為醫曼公從之遊盡傳其術明亂棄儒冠而隱焉後師我在崎嶴應吉川氏之請往來於長防之間其臣池田嵩山通稱七兵學書於曼公曼公審其為人因為曰我有治痘禁方書欲悉授子子學之三年必臻其妙嵩山拜而受誨遂大著於世其書大旨淵源乎龔氏痘疹全幼録云曼公博學能詩兼工篆隸嘗在崎逢舊友喜賦曰勿勿別去忽經年有喜重逢海角邊爾我遭時因作客弟兄把臂合隨緣遙瞻南粵家何遠近憶西湖夢自牽世外人情俱不問半窗風雨剪燈前又普門寺寓懷云六甲年周行改僧疏疏散散任無能相隨瓢衲因緣地願作宗門一唯曾海內學書者最多而高玄岱獨極其蘊奧曼公晚年慕僧隱元遂為徒弟更名性易而為醫如舊曰濟物是佛心道本廣大無所不在其治不規規成方而得驗每多雲寬文十二年終於菟道有遺偈鑿鑿塵塵傍海林不忘殘夢繞空軒咄任他凍折梅花影接卻江南白玉魂陳明德亦杭人屢試不第明亂歸化為醫崎嶴術屢奇中著心醫録云醫者意也心通乎術臨證如持權衡以輕重較之苟非心得雖療病而痊亦唯偶中而已延寶二年沒世所稱穎川入德即其人也張膏孟二寬偕善醫膏尤精眼科朝鮮之役二人為我軍所俘膏字甘子號提山豐太閣遣歸國二寬改稱武林次庵蓋取其本邑為氏明歷三年沒其孫為赤穗候臣死節所謂武林唯七也享保三年戊戌命徵西醫是歲杭州陸文齋蘇州吳載南朱來章題松陽汀州周岐來等應命而至九年甲辰又命募求醫書吳舶因齎醫畫數種來後文化元年甲子徵蘇州胡振字兆新於崎嶴使小川汶庵千賀道隆吉田長禎三醫士就學蓋此例云五雲子名寧宇系出於大原王氏慶安中投化住江戶以醫行一時從遊極衆萬治三年庚子沒門人數輩列於醫官一派傳授至今弗衰五雲子來江戶日懷藥裹行呼曰持脈持脈俗謂診曰持也友松子出大阪亦高唱街上曰難讀之字吾善讀難治之病吾善治名醫創業發迹各異北山友松子少通象胥學又從禪僧化林學仲景奧旨就載曼公得內經本草精蘊既而謂皇朝醫風亦不可不研乃師小倉醫員原長庵岡本玄治高弟遂大成其業友松子療南源悅山高泉諸僧皆用大劑曰西土人比之於本邦頗厚腸豪氣非輕品所敵風土體氣之異醫者不可不察焉西土醫診病直記其藥案以與病者病者購之於藥鋪以服之故藥品量適正與邦醫輕劑射利者迥異友松子不喜講説唯正月初八祭神農氏使門人講上古天真論而已其説曰書在心悟不若熟讀百遍講義何能益於人某候問友松子譜系友松子略不抵飾即答曰臣長崎娼女之子不知家世友松子墓在大阪太平寺石造不動佛像高丈餘以為表不復記姓名世稱北山不動常祈病香火至今不絶其裔正藏為過書船吏自號七僧居士風流好事與芙蓉大雅諸名士交遊人知有七僧之稱而不知有正藏之名黑澤道鄰以醫仕於小幡候溫雅風流人推其長者平維章為之傳云尋崆洞之山克搜其道溯延壽之源克得其術豈徒通其道而已哉詩賦卜筮吃茶插花風雅之興各得其宜嗚呼若人之儔亦難得哉橘隆庵名元常號宗仙院本藥師寺氏其父平馬名元成仕本多能州以事為同僚岩瀨某所害元常即時復讎健鬥失左手年甫十五因翻志學醫於京師術成大行於江戶世稱曰手捧隆庵俗呼無手者曰手捧執政柳澤候疾劇治之速效薦為醫官後增祿至五百石敘法印元祿十四年辛子五丸公子有病急召隆庵隆庵以輿隸忤意斷其首於下乘橋乃入夷然上診執政感其勇悍反得賞賜閣老松平候右近將監室懷妊使服部見瑞看之臨盆痛甚急坐婆曰痞起可藥候馳使報見瑞見瑞曰夫人之苦非疾且余豈受坐婆之使令者乎不即往因延武田叔安名信卿後號常信院叔安診曰宜先治痞而後娩乃與藥如其言旦日見瑞來候大恚告以叔安言見瑞笑曰渠唯詭辭以慰俗情而已豈有向産門施他治之理乎處方當與余同試檢其藥果然候嘆曰嘻余誤矣醫治已如此況於政事乎富永伴意元祿間以瘍科鳴為人質直有氣力嘗浴混堂一俠者易其矮小命令刮垢伴意佯應窺間直攫陰囊急引之曰汝能辱人其人失色哀號謝罪乃徐釋之細川候臣某有病急招邸醫某某曰方食少遲之時伴意在座責之曰藩士有急而子以食辭豈候祿子之意乎吾恥與子交某大慚亟赴病家時新幣初行伴意舉示子弟曰自今以後人心必日澆汝五六十歲天下將大困窮汝宜省焉終如其言長澤道壽著醫方口訣集三日而成有馬涼及手寫證治準繩全帙咸其所諳記云鳥山見庵名守道越前府中人受醫術於有馬存庵學經義於伊藤仁齋前此越人不知汗下法及見庵唱長沙之旨其術大行當日陋習為之一洗又常使其徒兼講儒學以謂不通儒術醫事不成物徂來曰醫之不可不讀儒書者有四一以識字義文理語脈氣象否則雖讀醫書亦不能會古人之意於千歲之下一以識異邦之物産時世制度民風土俗之所以異同否則於醫書有所不通一以識天地造物陰陽五行之奧妙三才人物之所當然與所以然否則君師之權有所不立而不能以取信於人不能以施仁於人二子同時而其説互相發揮故附記國玄貞正德癸巳春病甚賦詩曰貪看青山影風月不若溯流歸去來即日沒玄貞墓在崎嶴茶白山門人私諡曰思靖先生五井持軒名守任後稱加助大阪人學醫於向井元升及中島長安有婦人乞治者方劑偶不中乃嘆曰將以治人反致人死何以醫為遂改為儒真名部忠庵名臧字季廉築後人以醫仕子久留米候一日療人而不起以為術疏之所致慨然投劾而去入京業儒世稱藤井懶齋是也二子可謂不自欺者中村玄春名明遠字子晦世為幕府醫官玄春不樂以技仕每嘆曰士君子濟世奚翅醫哉後上言陳志終為儒官改稱深藏山田大佐名正朝穎悟夙成有神童目擢為儒員時年十三二人一以志一以才皆從醫轉儒者也有馬存庵一日如嵯峨路睹大櫻樹花方開數金購之雇役夫使移之其園中根干橫倒不得植相視嘖嘖存庵欣然曰姑舍旃余且臥觀之板時明長門人每語人曰學聖人之道譬如弄數百斤鐵棍自非膂力過人必為其所厭醫業亦如此名古屋丹水襟度簡曠喜讀莊子又好佛典曰除病濟人我亦醫之如來也恬淡無為守神修真我亦醫之南華也飯田玄泉京師人曠達不羈鳥取候有疾遣使邀焉玄泉出對乃入取質錢簿示使者曰吾衣服典盡如此倘肯見贖則應命矣使者為贖乃往井關玄説名常甫元假面工俗曰能面打師某子某嘗為優伶觀世氏造假面成使玄説齎至觀世氏視而怒曰拙甚即引鐵錘碎之以拋玄説玄説深恨焉歸固請父改業為醫年甫十六日夜奮勵終為名家官廁醫員時觀世氏妻病篤衆醫束手觀世氏百方因緣受玄説之療病漸愈一日玄説謂觀世氏曰子未識吾有神符耶乃出錦囊於藥籠中示之觀世氏拜而觀之則假面屑也因告以故曰不忘前辱故有今榮是非所以為神符者歟觀世氏聞之將容身無地恧爾謝其罪後藤艮山始志醫提贄錢一貫文執謁於名古屋丹水丹水以其贄薄不合家規不見艮山憤悶填胸將出門罵曰玄醫鼠輩不知人乃自奮勵遂至成名艮山治疾多用溫泉熊膽艾灸故人呼曰湯熊灸庵門人香川修庵亦喜艾灸山脅東洋專使石羔一時嘲曰香烙山磔此與西土嚴附子陳石膏張熟地之稱殆相肖香月牛山仿石川丈山詩仙堂構醫仙堂揭古人像六皆平時所欽仰各取其言題之書並匾額亦皆出一時臺閣名勝之手牛山病革命弟子持藥匕來起坐加於額者再曰以刀害人者服上刑以藥殘人豈得無尤余幸獲保首領以沒者醫此匕是賴享保十四年己酉為邊陬乏醫藥命醫官林良適丹羽正伯就官庫醫籍選單方捷法易用者名曰普救類方上梓以頒行於海內先是命翻刻東醫寶鑑以行於世皆出於有廟深仁之餘澤云石原學魯字貫卿號鼎庵精醫工書又善詩初欲仕官或謂曰以子能售之候門豈不中祿八百石乎學魯艴然遂絶意仕進長岡清白讀普渡慈航至墮胎方拋卷嘆曰嗚呼是何言天地之生莫貴於人焉何忍為此荼毒使生靈不見天日而殤殞因大聲罵龔廷賢畜生取其卷而唾之可以見其心志之概矣但普渡慈航實系偽撰以此責廷賢而屈冤矣清白號恭齋元祿中人有醫名山村通庵遇朋友喪近前神主唱平部數曲極哀既而不見喪主曰我知死者未識生者香川修庵出行未嘗野溲門人問其故曰農作唯此物是賴一滴之微不可使無用於世矣永富嘯庵曰修庵接踵艮山氏為古醫方之陳勝故藥選一書非若從前本草之迂誕然天資偏固多客氣其言亦類其人不可不取捨也村上冬嶺自少好學老猶不懈恆與諸儒會讀草一史月率六日不避寒暑凡二十有餘年又好詩每有所作必題扇頭與諸友評榷字有不穩濕紙揩去更填他字江村北海曰冬嶺詩學遒上精深工整超出前輩元和以後巨儒碩匠篇章傳世固多五七言絶句及五言律間有可録若七言律首尾完整者無幾迄冬嶺體格始備淺井圖南才氣敏慧廣綜衆藝畫竹最有風致時宮崎筠圃御園意濟山科宗園亦以墨竹鳴世稱平安四竹御園意濟一作齋京師人善醫最精針灸一日西本願寺主嬰兒俄然啼泣不止遽延衆醫醫皆以為病投藥無效意濟後至診曰此兒無病必有他故乃脫襁褓視之果有虻匝啄股間急手捉去啼泣頓止一坐駭嘆梁田蛻嵓應山脅東洋之招在京數旬東洋優待唯恐失其意一日治具請賞花於東山時花正盛開蛻嵓馭甚久之忽蹶起曰吾去矣侍者驚問其故曰汝主每見我輒叩問仲景之書使人厭倦我不欲復聞之遂去山脅東洋始得鷓鴣菜湯方喜甚凡所診數輩不問何病悉與試之而知其順逆當否得他奇方亦如此其剛愎而篤於道非世人之所及東洋男玄侃號東門應澱候招一夜端坐案方侍者屢勸就寢玄侃不肯曰余為候忘寢食子等不忘則寢矣永富嘯庵問山脅東洋曰我事夫子三年技不少進其故何也東洋曰吾子須多讀古書與古人晤語以蕩除子胸間之汙穢嘯庵當時泛聽未深解其意後十餘年周遊海內試醫術始知榮辱悲歡之情有妨診察之機大服東洋之言因嘆曰先輩之曠達自高不拘規檢者洵有以也惠美三伯專用攻擊人或不堪其毒偶有服藥而死者大憤表其墓曰三伯殺之三伯不顧益強行之遂至拔痼起廢名震於近國奧村良築始用吐法大得謗議國候為下令禁用之良築不屑曰朱晦庵唱道學而宋禁之釋法然闢淨土門而朝罰之況於吾黨乎嘯庵曰東洋之於下劑良築之於吐方皆數十年枯髯嘔血之所得而世之粗工乃泛用誤人遂歸咎於二子甚矣後人亂道也嘯庵常懸一橫匾署曰乾坤容我豪自謂吾一生此五字盡抬得嘯庵僑居浪華時人屢勸祿仕嘯庵不堪其煩題一聯於壁曰生涯拼潦倒世事甘浮沉清田淡叟曰獨嘯庵周覽海內英邁之氣煅而煉之以成其才遇物無所窒礙其機略不在於寇平仲揚處道下吉益東洞曰吾醫視之令之儒流東洋其伊藤仁齋乎先衆著鞭矣吾業不敢讓物徂徠焉以東洋唱古醫方風靡一世而其持論時有軒輊也東洞每言天下之醫以余為標準蓋謂從前陋習賴斯人而一洗也東洞長子患痘其證險惡以紫丸攻之遂不起及二女亦病仍與紫丸或諫曰長子之不起人皆譏其過攻今復用之萬一有變得無悔乎東洞曰方證相對服之而死命也豈拘譭譽而變其所見哉堅執不可吉益螺齋曰家翁每云圍棋有意於勝敗則不能到真境是即東洞死生非醫所關之見村井琴山世推其嚄唶老醫其風流灑落絶無知者生平遊心於琴譜茶經花史香品著琴山款設四譜皆系以詩以闡發其妙趣又有六清真人説其文曰清晨盥嗽灑掃堂室及庭內次洗瓶插花以清目次拂拭香爐几案爇沉檀一片以清鼻次汲水潔淨諸器品茶煎之末茶點之一碗至三碗以清胸膈口舌次調古琴彈南薰滄浪二曲各一再行以清耳而後坐書齋讀聖賢之書以清心因自號曰六清真人又曰清福道人香房茶寮花軒琴所並有諸友亦並命以清香房三友沉香曰淡清檀香曰奇清合香曰暖清其寮二友煎茶曰妙清點茶曰緑清花軒十二友春花三迎春曰黃清桃曰夭清海棠曰豔清夏花三芍藥曰麗清柘榴曰紅清蓮曰妍清秋花三桔梗曰紫清秋海棠曰嬌清菊曰逸清冬花三寒菊曰幽清水仙曰真清梅曰韻清琴所三友琴曰雅清南薰曰聖清滄浪曰賢清琴山少時在京師或以周公待旦求對琴山應聲曰左丘失明琴山雖事方伎隱然以儒自居其教弟子以名分相制以受業先後分其次序終身不改其班説書固守師説不變之聞弟子中垣順庵久病不愈或勸之服溫補之劑順庵曰使藥無驗猶可也若有驗吾道廢矣其尊師道概此類也龜井南溟作一律示琴山曰東洞先生老學醫經方祖述漢張機星霜七十窮愈固弟子三千信且疑萬病有源唯一毒私言雖好奈公議英雄心事深堪憫目睫依然鸞鳳姿琴山援筆加訂老學作唱疾星霜作春秋且作不有作無私作公雖好作有徵奈公作勿私深堪憫作都如此其篤於信師如此或問海西豪傑之士於廣瀨淡窗曰就豫所交言之龜南溟村椿壽僧豪潮其庶幾乎淡窗曰南溟翁慷慨激昂似李空同又曰琴山之才不及南溟而識則過之賀屋淡園曰東洞之於柴胡南涯之於當歸均是偏也永叔文多用嗚呼人稱為歐嗚呼子鱗詩多用白雲世又呼曰李白雲然用各當窾不可移易何不可之有淡園年十九在明倫館茹胡瓜發腹痛服紫圓及大柴胡大承氣等湯而痛益劇一醫進平胃散淡園卻之曰吾志於古醫法寧死不飲後世醫之藥矣安田文達名超初好學善詩既而幡然改志曰今之儒異於古之儒空詩浮文何益於世遂以醫顯村宗碩京師人善醫嘗至一豪家主人病篤親戚醫工紛紜聚訟宗碩大聲叱曰驅除爾輩處方始定松岡成章以精本草聞於京師享保中闢鑑別藥品時清商始齎空清至有司私請曰此物若非真則官不啻失利吏亦從有罪幹旋賴子之一言請圖之成章曰諾鑑畢大聲曰是偽也空清內必蓄水一碎試之而可有司錯愕不知所為碎而視之果乾涸無水矣人皆服其精鑑官將留祿成章固辭曰臣邱壑念頻矣請賜放歸官不能奪賞以金若干成章即以為路資逮歸京師封其餘還之於官府田村藍水名登通稱元泰精於本草而性骯髒酒間喜食諸毒蟲及蠟蠋又以灰和飯而吃唯不吸煙耳井上金莪詰其故曰煙草與蚰蜒反故不用之金莪笑曰余寧舍蚰蜒而取煙草耳伊藤茂臣字子良尾張人常謂子弟曰醫之治疾豈問賢否親疏然於忠臣孝子最宜盡心焉耳加藤正庵尾張人善瘍科性粗率不拘為人治疾動忘其名姓喜賑濟人歲杪橐金出行見親舊貧者即與之而不問其家資好畜古刀遇家人掃塵剝啄騷擾正庵以屏風圍坐出刀拂試玩賞大聲曰快楢林由仙京師人世業瘍科事親至孝淡於營利常閉門戶人不通名刺則不肯開有請治者自挈青囊而行病家不速邀雖權貴拂衣而去瀧鶴臺每聞人之善言懿行則必雙淚交睫千金翼云買藥不可爭價此言有深意國朝惟宗具俊著醫談抄引以為證近古太田資齋福井楓亭等皆為時名工餘事皆節約至於藥則竟不論其貴賤可謂篤於所業者高津惠因伊豫川上人號東白翁與其兄東村同居兄弟皆以治疾教字為業布衣糲食不靳榮利二人俱不娶有一妹亦不嫁暇輒三人團聚飲酒歡樂時或裁歌賦詩互相唱酬先後以壽終尾藤二洲幼時受章句於惠因談及其人每嘆曰此等人雖難執繩墨論要自有異常處視夫儒雅自名而役役貨色者何啻仙凡長野豐山孟確曰並河天民制行詭異有膽略頗似陳龍川要非凡庸倘有英君駕御之則必有可觀焉清水濱臣曰森雄風翁名藏字伯高岡醫員似避世而非避世似醫而非醫亦非學士亦非歌仙可謂天下一畸人矣森下驥字千里彥根人曰川越正淑解傷寒名義奇僻太甚然至其釋諸家之所未能通瞭然目下則可謂前無古人矣尾臺楁堂曰田中願仲讀藏志極論東洋之疵瑕掊擊不假使東洋再起將無所措辭焉其實議論不無過激唯其文詞遒徑在醫人為難多獲也荻野臺州曰張子和沒六百餘歲我藤良築氏出華枯肉骨其術不讓於子和雖然吐法尚未備則後進無所取規蓋亦子和疇也皆川淇園子玄子贊云民之將生時或折副翁善察幽造化弗匿肆順厥理救之危亟設術著諸建法遺則方策之傳天地罔極民之賴全何唯兆億噫嘻大矣翁之功德藤澤東畡名甫字元發青洲贊云古今貫法內外合科發未發祕救難救疴南海奇地爰生奇士賴而蘇者四海是盈從而遊者至自萬方人以術顯術以人闡子玄青洲發曠古之祕二子推獎亦非虛贊也片倉鶴陵曰芳村恂益見聞雖博著書雖富其學竟不傳焉如吉益為則學問不博所見亦偏而其術至今益行醫之於識見不可不審也土生義壽玄碩曰後藤香川山脅松原吉益各以古醫法鳴當時稱為五大家而今言古醫法者獨依吉益氏無復言四家者其故何耶取仲景之方法以驗之於今日之病者實得而後言無一浮言此所以吉益氏獨顯而四家不得與也大阪戶田齋宮自署曰草醫某京師片田重三郎寬政中人以儒醫行亦署曰町醫片重皆以警世之藉重位號以炫其業者垣本針源遇痧病筋脈隱微不見者先與荊芥金銀花湯俟筋脈悉見而刺之術乃奇中又治膈噎於人迎邊搜得血絡怒脹妨害食道者以鋒針刺之出黑血飲食忽得下咽數日再發復刺即瘥是皆他醫之所不及其以針源自命非誇也獨嘯庵漫遊雜記往往録失鑑誤治以為後圖片倉鶴陵亦匯數十年錯治病證顏曰覆輒編俱有裨於後生矣醫黌所藏全骨藝州醫星野良悅所造也初藝州瘍醫田中道長者目不識一丁特以手術精妙大行於時良悅伯母患落下頦衆醫束手乃請道長道長方療之延病者於室隅相與冒大布袱不使人觀其手法一術即治良悅心憤之以為若證非知內景不可下手內景非親解剖不能極其詳乃請藩得刑尸親解剖以檢之然骨肉之際會經脈之連屬乃不能分明遂再購刑尸往海濱節節炙之而後支分體解始得其實於是創意作全骨居數年杉田元伯唱蘭學於江戶乃攜來徵之於元伯所著解體新書毫無差謬醫官堀本一甫桂川南周勸獻之於大府云築前道村醫生養朴以眼科聞於西海常盛水於盆浮發於其內以燔針刺其發發兩斷於左右曰不如此則不能刮眼中之筋膜其子學之數年其發雖兩斷水有微聲父曰有聲者不可刮眼其人不堪痛苦也杉本樗園曰慶元建櫜以來儒雅彬彬出世而刀圭之流術造其奧者亦不為鮮矣若夫短裁促筆媲美丹鉛諸家僅有芳村謙受鈴木良知耳橘南溪曰本邦醫籍皆不文無足觀者唯賀川子玄産論畑柳安學範二書文章稍佳可為本邦醫籍之冠其他不足示西人南溪曰漢土之醫文勝質皇國之醫質勝文文質該備不愧於漢土者特香川太衝耳矣劉茝庭曰名元堅字亦柔通稱樂春院近日醫家著述多假名儒之手顯醫經解惑論之於太宰春臺産論之於皆川淇園産論翼之於柴野栗山皆是也片倉鶴陵著亦多成於龜田鵬齋太田錦城二子之手高原秀治字道懿長崎人從西玄甫及三博學醫業頗行為人剛毅臨事敢為正保中兄某為人誣告繫獄十年秀治無日不詣府署而哀請後殆逮繫焉時府尹新至更為覆審兄弟卒得免松丘宗順佐賀人少落魄往長崎販米自給後以醫鳴性刻深有機智里人溺閉不治宗順與下劑通後竅而前竅卒得開樵夫誤墮傷前陰囊核懸垂不可收使醫縫合之隨手脫出宗順置盤水急灑面傷者出其不意驚愕一叫核應聲而收矣吉田順昌初名空曇江戶人壯歲坎軻生理數躓一日食盡與僕吉助對泣吉助志不少變善資其主順昌因勤苦奮勵明和中其術大行三井養安越前府中人為醫於京師與高森正因齋名晚年遊大阪市有丐兒為繩戲養安每日必往而觀之或問其故曰吾非樂之特憫無人知渠勞爾岡魯庵名元鳳字公翼大阪人性溫勤家法嚴正不妄交遊嘗造書庫左右鑿牖置機於中央有暇則就而抽架書讀之超然有世外之趣人皆羡其修整又嗜詩及物産庭設小圃雜植藥品吟哦自娛著詩經品物圖考香橙窩集江村北海見其詩以為有古人之風曰句法格調在今世不易得也赤松春庵名惟義字子方播磨人以醫居大阪為人朴實好學常談性命不作詞章最厚友誼有善必告見過必規自謂直情徑行不能隨人低昂小河寬字仲栗通稱天門長崎人善治瘍性剛直不喜苟容有權豪請治辭而不往曰邑不乏醫何使寬也貧窶請之則竭蹶而走一治子不孝見逐以割烹寄食於人寬治疾過其家主人為命作膾寬見之驚曰嘻是不孝之子耶不食而出其子慚且泣曰小河君邑之望也而不食我膾生不若死遂改志為孝子小石元俊名道字有素醫術專務實驗常語子弟曰開活眼以讀古書須會其活處若拘拘於成規堅守死法欲以治病者豫所鄙也至自得之妙則父不能傳之於其子所謂活法已其勿認活法為死法角田美利字子利號東水豐後岡人隱於醫性格端嚴老益骨鯁言論不苟合某地有災薄城下有司驅市人入城閉門不許出使其死守救火城賴得不焚美利聞之曰城可再造人不可再生若不幸而城不救則將並其人而斃之可乎北山橘庵名彰字元章河內一屋村人學文於郡山柳棋園習醫於大阪橘元泰業大行好搜典籍有售必納大阪書賈聞之亡論奇書珍編尋常猥瑣册子有剞劂告成輒以北山氏為壑家人頗厭之橘庵笑曰吾亦知其濫然我家僻在田野不如此則書賈不至採葑採菲無以下體此之謂矣柘植龍洲浴有馬溫泉視泉氣稍冷親率雇夫百餘人手執插督作六日夜撥甃清窟御他水濫入泉乃溫蒸復舊土人至今稱其德又著溫泉論行於世服部宗賢名時壽字子篤大和人仕高取候業大行請診者常滿戶而宗賢躬履儉素以賙恤為念窮民多賴其澤高取川數漲壞橋民病之宗賢乃損資造石梁是歲大稔人稱豐年橋望月鹿門曰醫亦不可不善書昔時稱善書者在醫官則津輕玄策吉田策元桂川甫三在閭閻則原藝庵野呂元丈尤著爾後數十年術與書益衰矣鹿門有乞治者不問貴賤一竭心思嘗出行睹乞兒患痘還便煎藥遣人與之又值一優來乞治乃日往診之同僚或諫止之鹿門曰我療其人非為觀伎也何避嫌為遂不從劉藍溪竭力醫職大府賞其勞賜金若干曰君上特賜不可以供常費乃盡付書肆曰使子孫讀書勿忘君恩且有所報也於是奇書爭至架插大富今醫黌之書多藍溪所聚云劉桂山曰束洞藥徵有卓見世不可無修庵藥選可取殊少桂山典雅風流自寫山水氣韻高古世傳為寶古賀精里曰世之攻方者未必善治攻方善治者未必得施教之地劉桂山並三者而有之而處之以篤行待之以博愛其徒雲集多所造就時方望其警覺世醫推仁術於四方而一疾遽沒矣噫余作桂山傳而未見其醫按以為憾頃得一則因録焉水戶候諡文公有疾其初登圊大便不快下胸悶短氣如此兩三日或發或差乃召桂出診之其脈滑數無根底面色青慘心下微滿而拘急腹裡無動臍下空軟如綿乃知其病上盛下虛非一日之故也但侍臣視其起居如平無能察知病情者桂山出而語曰候病雖似支飲實由中氣虛耗殆為危證治法宜峻補方中加沉香更進黑錫丹以回陽鎮逆猶恐不及也侍臣開之或驚惶或疑惑不知所為明日診之間吐痰沫其色茶褐色厥明又診之脈十動一止因謂侍醫曰此證此脈俱為藏氣竭絶之候恐有急變也須灸天樞氣海三里絶骨等以培下元醫不信逡巡進降氣之劑而至日晡將登圊短氣息迫卒然昏倒急使人召桂山至則絶矣桂山嘆曰候之疾縱屬不治使侍臣早見其機醫察其微則未遽有今日之變也先考濟庵翁名惟諧字子德通稱惇篤曰本邦亨元以還長沙之學大闢戶著家述為不讓漢土然吉益為則一切武斷矯枉過直其子猷務皇張之亦不免蛇足齋必簡恢博緻密一章動至數百言而未能盡其底蘊門人淺野徽拾其唾餘可謂狗尾續貂矣內藤希哲條分縷析頗多濬發雖未免排割之習亦芟除葛藤開別徑者也中西惟忠注釋顯明期於實用川越正淑依樣胡蘆碎殘極矣山田正珍博引旁證一掃從前固陋之習其長在博其短亦在於嗜博也至於桂山茝庭二氏學術湛精尤得解經之體而學者漸向正路矣太田錦城遊京師多與醫流交談及關左諸醫至劉桂山則皆斂衽起敬其次以片倉鶴陵為勍敵驪恕公年甫三歲辨文字稍長聚麻子排作算子習九章術人目為神童天資穎敏加以勉勵白首不倦終極精核當時無比最長於校讎素靈難經傷寒金匱他洎醫家之雜著行間上下莫有餘白小野蘭山舉為本草教諭年已七十餘手寫稻若水庶物類纂六百卷人稱為今胡徵君池田錦橋診痘如甚不用意者或問之曰診察過密則反失真其妙存於目擊首肯之間譬如望見刑人之就死雖至剛者恭然焦悴之狀見過眼之間若相對久則其形氣與常人無異也錦橋當直亂髮因自櫛之或嗤之且諭以獲譴錦橋曰僕本窶人子素慣粗陋況幕府之召臣以術而不以小謹雖陋何害錦橋卜居駿河臺屋後築小樓樓下陳列酒樽樓上貯痘疹書讀書倦則浮白遣興當謂人曰有酒盈樽有書滿架足矣中垣順庵名穀神南築名醫善飲嘗語其友曰吾非好酒無如人強之何應之曰諂諛飲酒亦可疾也順庵大愧終身不復飲畑中椿齋文仲去京赴江戶鬻衣物價諸債所餘唯浴衣及二小囊備經艱苦既得志每歲以出都日作豆飯魚鱠祭諸神及祖先次展浴衣二囊以示子孫使無忘其素川村壽庵屋脊架望火櫓每旦早起登之望芙嶽曰吾不可一日不對此快友桂川月池瀟灑風流出於天性晚節嗜詩有五旬欠一始攻詩卻笑達夫起手遲之句禪心覺得緣眠少醫理諳來為病多一時傳稱望月鹿門曰為醫者宜邃於本草貝原篤信著大和本草最有功於我而雖殊方異域藥石亦不可不識焉青池芳滸名林宗字子達譯喎蘭書著本草及地志皆漢籍所未載者其詩云神農經外分三殖大禹鼎余記八垠伊藤冠峰名一元字吉甫隱居於美濃笠松里醫事自娛不肯出仕曰居足以容膝衣足以覆體食足以滿腹樂足以忘憂我何有所不足而願其餘哉山本封山名有香字蘭卿通稱中郎越中高岡人初仕某候不遇退而業醫住京師諸候有慕其術而聘之者不起或問其故答曰吾罷仕去不能無業非以醫自著讀書為娛非以道自名動則拯衆生靜則觀一理是吾志也冬嶺一日與伊藤東涯訪論藤參議韶光別業參議命賦梅詩坐客相繼成篇冬嶺獨沉吟逮晡始得一絶句曰宴罷瑤池王母回月明素袂立青苔仙妝難著人間語姑喚暗香疏影梅猶推敲不止商榷於衆東涯曰梅作來為佳遂定其耽詩如此此條當在前村上冬嶺次今載此者系補遺劉石秋名升字君平曰後藤艮山純於經義山脅東洋博於疏解香川修庵無書不讀香月牛山儒雅自喜吉益東洞永富獨嘯庵於兵法經世之學尤稱深煉雖以刀圭為家要皆貫穿古今出入百家環奇倜儻能言所欲言為所欲為以偃蹇於一世可謂人豪京人目以儒醫亦非無謂也明和中劉藍溪再營醫黌遍招都下名流教育諸生其嗣子桂山講素問山田圖南門人土佐醫員笠原云仙笠間醫員中林俊庵與焉桃井桃庵田詔候醫員講傷寒論目黑道琢字恕公門人曾根惟中西村玄周與焉講素難等服部玄廣清水邸醫士講靈樞加藤俊丈市醫講難經田村元雄曾昌啓與焉太田澄元講本草小阪元祐岡田道民彥根醫員講經絡井上金莪吉田篁墩龜田鵬齋太田錦城等講儒籍大抵以百日卒一經為度其費一出於私俸江戶醫學之興自此創也跋嚮者栗園著皇國名醫傳敘先哲遺蹤記載詳核炳若丹青乃復拾其遺珠著成斯編凡涉於醫事者片語隻字莫不纂録其體略擬劉臨川之世説剔繁摘精事類粲然直使讀者有與先輩把臂應酬之想焉則雖命曰醫話其實醫史爾余因嘆今世無良醫者不用意於醫事故也用意於醫事者如之何必也徵之往籍參之先賢之遺緒而復驗諸今日之事實如此而已矣欲參之先賢之遺緒栗園前後之著其可少歟聞斯刻之既告竣喜而為之跋今村亮祗卿淺田宗伯小傳淺田宗伯名惟常字識此號栗園宗伯其通稱信濃栗林邑人其先蓋出乙葉三郎賴季有孫內藏助長政者屬木曾義仲食邑信濃淺田城因以為氏天正中桔梗原之役甲兵燹城邑城主戰歿家臣抱幼孤隱於栗林邑至祖東齋始以醫為業宗伯幼岐嶷嗜學強識異乎群兒歲十三從舅氏熊谷某讀醫書又就松本儒臣木澤天倪受詩書又從高遠教授中村中倧問儒醫要義十八負笈遊於京攝聞宿儒老醫緒論頗知方向既歸襲父祖業一日過祖先城址慨然發憤決意東征臨去賦詩云父教蠱上九母針詩式微桑蓬豈枯落聊向東方飛歲方草二來於江戶寓伯父佐久間某家後屢遷徙貧窮艱苦能忍人所不堪立志益固不以寒飢屈齡過四旬稍稍為人所知然天資骯髒學問該博凡醫家之書上自漢唐下逮明清莫不搜索貫穿取此長舍彼短畜積浸涵若己固有之其診病也應變投機神出鬼沒非庸醫所能窺測也於是聲價日熾搢紳走卒莫不輻湊而乞治焉安政戊午疫利流行歲中診病凡二千九百九十三人六年奉府命校訂醫心方於醫學館文久元年謁見大將軍列徵士應慶元年佛國軍將列翁沉疴經年不愈遂來皇國館橫濱乞名醫於大將軍大將軍命宗伯療之不出數旬而報治佛將歸國報之國王聞者驚歎二年大將軍在阪城罹病召宗伯命為侍醫診其病曰腳氣也洋醫不服曰是心藏焮沖之證宗伯即論列五徵辨駁之及其薨也果如其言諸人歎服尋為天璋大夫人及和宮公主侍醫明治四年米利堅學校聚萬國醫籍因又需於皇國太學東校擇數種贈之宗伯所著皇國名醫傳為第一其他著述若干種有已上梓者有未上梓者生平約其所歸向傲然諭諸生曰論語修己傷寒論救人外之宇宙間無可讀之書夫邃於學者或疏於術工於術者或乏於學古今通惠也已足於學又熟於朮若我宗伯世未覯其匹也是可以傳野史氏曰古語云寧不為良將為良醫旨哉言也非規模宏大識見高明則不能領其旨矣宗伯在鄉里發憤者特在此一語遂來於大都廣業震名得達初念豈不愈快哉嗚呼遠祖已為良將裔孫今又為良醫我恐起死肉骨勝攻城野戰遠甚不啻不恥於祖先又可以為後進模楷
