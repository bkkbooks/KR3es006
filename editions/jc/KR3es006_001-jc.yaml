body:
  text: 前編卷上厥初生民醫藥隨興神皇產及靈尊大己貴命少彥名命邈矣其事不可得而稽焉及允恭帝三年新羅國奉敕貢醫金武尋雄略帝朝百濟國貢高麗醫德來欽明帝十五年百濟國又貢醫士王有稜陀採藥師潘量豐等爾後歸化醫名相繼於籍推古帝時百濟僧勸勤獻歷天文地理及方術遁甲等之書於此山背日並立首就學方術繼而西土醫書傳播日廣良工輩出當時皆以醫師冠名以為稱呼史總稱之謂藥部云和藥使主善那使主父知聰吳主照淵孫欽明帝時從我將軍大伴佐上古來化獻儒釋醫書明堂圖及佛像樂器等善那受父醫方孝德帝時始制牛酪以進帝善之賜號和藥使主改名福常子孫世居難波其裔有弟雄安主黑麻呂等貞觀六年賜姓宿禰弟雄歷右近衛將監丹波介安主黑麻呂並從八位上皇朝古昔重種姓故有賜姓之典然以今考之宿禰連朝臣真人等其實亦品爵之類耳不可與西土一例看藥師惠日難波連奈良藥師惠日五世祖曰德來雄略帝時徵醫於百濟德來應徵而來子孫世居難波因稱難波藥師惠日與倭漢直福因及僧惠齊惠光赴唐學醫推古帝時歸朝奏曰邦人留學於彼者業皆習熟宜召還又曰文物制度備具於彼聘使不絕則於國家有洪益矣白雉五年奉命與遣唐押使大錦上高向玄理等俱聘於唐館伴郭文舉問我神聖之名及地理惠日應答如流文舉感服寶字二年其孫內藥司佑兼出雲員外椽奈良等十一人賜姓難波連延歷中有難波連廣名及廣成廣名為侍醫典藥頭兼因幡權椽進丹波椽廣成內藥正法隆寺二天像足背記有藥師德保蓋亦同族奈良藥師吉田宜初姓吉為鹽垂津彥命後鹽垂津彥命往戍任那三巴汶地子孫留居焉八世曰吉大尚與弟少尚等相率來歸世傳醫術居奈良田村因稱奈良藥師宜其裔也初為僧名惠俊文武帝嘉其才藝敕還俗賜名宜授爵務廣肆宜好學最精醫書養老中試醫術科賜絁絲布鍬神龜初與同宗智首俱賜姓吉田連田取諸里名田村云天平初始命陰陽醫藥天文歷數諸道廣教授生徒宜首率子弟講習尋任圖書頭十年遷典藥頭兼相摸介卒年七十子古麻呂延歷中為內藥正侍醫兼歷豐前常陸介吉田兄人天平二十年任侍醫兼河內大目勝寶中進彈正少忠吉田斐太麻呂寶龜中為內藥正傳侍醫兼歷出雲伯耆伊勢相摸介吉田書主任佐京亮從五位上兄人斐太麻呂書主蓋宜之族故附焉後部藥使主後部藥使主億仁百濟人其先出自高麗大兄億德天武帝時來化為侍醫朱鳥元年病將死特敕授爵直大壹封一百戶蜂田藥師深根輔仁蜂田藥師文主和泉人其先與和藥使主同世以醫仕於朝承和元年賜姓深根宿禰六年為遣唐知乘舩事子孫有宗繼者貞觀仁和間歷官針博士內藥正侍醫醫博士兼加賀介宇多帝患陰痿宗繼用露蜂房製劑治之輔仁即其孫也少從典藥頭菅原行貞而學擢左衛門醫師累遷權醫博士侍醫延喜中奉敕撰掌中要方及和名本草又著養生抄三代實錄有蜂田岑範為典藥大屬蓋亦其族倭漢直福因倭漢直福因推古帝十六年從聘使小野妹子往唐學醫三十一年從新羅使智洗爾而還桑原訶都續紀訶作加訶加聲通桑原訶都天武帝侍醫朱鳥元年授爵直廣肆賜姓連天平中有桑原村主安萬呂蓋亦其族益田直金鐘益田直金鐘以醫聞天武帝弗豫敕金鐘及僧法藏赴美濃國制白朮煎以進焉因效賜絁綿物部韓國廣足物部韓國廣足從役小角學咒法又就僧鑑真問本草天平四年擢典藥頭御立連吳明御立連吳明初稱吳肅胡明以良醫聞養老五年詔曰文人武士國家之所貴重也醫卜方術國家之所崇信也精其業藝者豈可不褒賞哉困敘從五位上賜以絹絲布鍬神龜元年賜姓御立連按史有御立清道者恐系胡明改名秦忌寸朝元秦忌寸朝元父辨正大寶中赴唐以圍棋得唐主幸生二子朝慶朝元辨正朝慶死於彼朝元獨反通於醫方養老五年敘從六位下賜絹絲布鍬累遷圖書頭主計頭以其善唐語命兼譯官大羊甲許母懷風藻作許率母續紀作胛巨茂皆同大羊甲許母敘從六位下養老五年賜絹絲布鍬以賞其醫功神龜元年賜姓城上連孫城上真立亦以醫彰天平中擢侍醫兼大和大椽尋敘從五位下答本陽春狖賦答本陽春善醫敘正六位上神龜元年賜姓麻田連陽春又善詞藻大伴皇子常延為客相與唱和其族忠節勝寶中敘從五位下後坐事廢狖賦忠節孫也為佐大史延歷四年遷典藥頭奏曰蘇敬所注新修本草較之陶隱居集註本草增一百餘種今所用藥材正與敬書合請自今廢集註而專用新修本草詔從之八年轉山城守天智紀有答㶱春初亦同族張福子張福子善醫與吉田宜御立胡明城上真立等同時齊名高義通高義通與福子同時亦以醫聞余仁軍余仁軍能咒禁養老七年敘五位下蓋高麻呂蓋高麻呂天平中為侍醫甘味神寶甘味神寶天平勝寶間為侍醫倭武助倭武助天平中為典藥頭其孫廣成延歷中為侍醫兼遠江掾馬史夷麻呂馬史夷麻呂寶字三年自甲斐守轉與藥頭累遷南海道使忌部宿禰烏麻呂忌部宿禰烏麻呂勝寶六年自神祗少副轉典藥頭累遷信濃守木工助治部少輔粟田朝臣道麻呂粟田朝臣道麻呂為內藥佑寶字三年賜姓朝臣累遷參議近衛員外中將兼敕旨員外大輔式部大輔因幡守神護元年坐和氣王事免官亡幾除飛彈員外介守與道麻呂有宿怨誣以罪拘而幽之遂憂憤而死高野山御參詣記有典藥允粟田憲重疑其族也淨岡連廣島淨岡連廣島光仁帝侍醫寶龜五年兼丹後介明年進典藥頭掃守王掃守王寶龜中為典藥頭累進大炊頭大藏大輔宮內大輔攝津大夫田部宿禰男足田部宿禰男足寶龜二年為典藥員外助文室真