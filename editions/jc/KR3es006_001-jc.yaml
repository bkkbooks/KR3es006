信德頂上德自珍等蓋皆韓人善醫者德自珍持統帝時為醫博士授爵務大參僧法藏僧法藏百濟人善醫天武帝弗豫法藏與益田金鐘奉敕進白朮煎且為招魂咒而驗賞賜絁綿布僧鑑真僧鑑真唐揚州江陽人姓淳于少從僧知滿講究佛論最長戒法嘗於大明寺說法時我僧榮叡普照等從聘使丹墀廣成在唐遇之因勸東遊鑑金乃率弟子祥彥道興與叡照等泛海阻風而反者再遂從我聘使古麻呂來化寓東大寺鑑真又能醫治療皇太后弗豫有功任大僧正賜備前水田一百町時未能精西土藥品鑑真為辨定之邦人效之醫道益闢世傳鑑上人秘方又祀其像李肇唐國史補云天寶末揚州僧鑑真始往倭國大演釋教經黑海蛇山其徒號過海和尚僧長秀僧長秀唐人天曆中歸化居鎮西以其良醫術徵住梵釋寺督僧務兼給醫事長秀一日詣桂宮觀庭樹曰此真桂心可供藥劑矣時人始知本邦有桂可用也長秀撰方書進之於朝世又傳其香方小手尼小手尼百濟人不知姓名善醫其手纖如嬰兒故名稱德帝前陰腫塞醫艱乎治之小尼上言請試其手術右中辨藤原百川不可而止僧惠清僧惠清宋人投化居鎮西能醫長和三年藤原清賢為按察納言遣惠清齎砂金千兩赴宋求治眼方王鞬南王鞬南元人投化居京師業醫陳宗敬陳宗敬元人應安初元亡投化居筑前博多博學通醫方人稱曰陳外郎以其曾仕為禮部員外郎云室町幕府聞其名召之不應後從僧無方參禪改名明照子孫傳其遺方所謂外郎透頂香也許儀明許儀明明江右人投化居薩摩為醫按平清盛時有宋醫闕其名北條時宗時有朗元房漢章二醫官恐亦系投化人而未詳其傳姑揭名以俟考
