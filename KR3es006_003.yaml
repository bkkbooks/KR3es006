body:
  text: 前編卷下僧醫浮屠之徒以咒符祈禱祓除災厄既兼巫職又及醫事故有僧而兼醫者養老元年詔曰僧尼依佛道持咒救病從施湯藥而療痼疾於令聽之及至中世海內鼎沸文墨藥石之藝一皆歸於浮屠氏而典藥侍醫有名無實如博士名實俱亡禁闥侍診遂為僧醫之專職而舊制令典顛墜極矣於是剃髮披緇為其俗法印法眼法橋為其位階以至於今日醫風一靡不可復變爰推其所由作僧醫傳法蓮僧法蓮精於醫術大寶三年詔賞之賜豐前國野四十町養老五年又詔曰心住禪技行居法梁而善濟民之疾苦鮮矣若人宜褒以爵三等以上於是賜號字佐君法法榮僧法榮性清潔持戒甚堅又能治疾勝寶八年聖武帝徵侍醫藥屢奏效帝特重之御藥專命法榮掌之及帝崩遂廬陵傍以修冥福孝謙帝嘉之優詔復其本郡永年毋役入道侍從僧侍從稱入道侍從萬壽三年帝弗豫衆醫以為寸白蟲侍從診曰是氣腫也進訶梨勒五香湯外以藥浸藍汁貼之而愈石屋僧石屋妙治傳尸病永萬元年二條帝弗豫密召石屋灸之有效理滿僧理滿河內人師事于吉野日藏有節操專心利濟常設小舟於渡口自棹涉人或訪病者施與藥劑不論親疏不要謝物佛嚴僧佛嚴通醫方安元三年藤原兼實患風延問治法從其言有效賢禪僧賢禪禪一作障以醫行於鎮西安元三年應藤原兼實招來居京師大善僧大善筑紫人治承元年藤原兼實得風疾病腳多方不治聞大善名招之大善為灸胸腹各七壯腳痛從差治承五年大納言邦綱患瘍丹波憲基針之不差大善從針口去膿血宿痛如洗重源僧重源居嵯峨瀧殿父靜源阿遮梁或云清原滋秀之孫故亦喜醫寬德中後朱雀帝病癰疽和氣相成以為病勢稍減宜止射水丹波雅忠不可乃徵重源詢之重源曰聖證方勵何止射水若發胸痛殆不可為旦日帝果胸痛而崩蓮基僧蓮基丹波氏之族壽永三年選長生療養方奏進智玄僧智玄居於下野安蘇郡糟尾鄉嘗赴宋傳醫方後鳥羽帝弗豫奉藥速愈因敘法眼世所謂録事法眼是也心寂僧心寂居於嵯峨藤原定家及冷泉室町土御門諸公皆信用其方如來尼僧如來尼以治蛔蟲聞藤原定家子病尼療之蛔下而差要上僧要上嘉祿安貞間以醫稱於京師葉上僧葉上名榮西任僧正建保三年源實朝有病命藥榮西察其宿酲非疾進清茶一盞而鬱困頓解為撰吃茶養生記行蓮僧行蓮嘉祿中掌鎌倉幕府醫事金蓮僧金蓮寬喜天福間以醫行於京師興心僧興心文歷嘉禎間以醫行於京師空體僧空體建歷中藤原定家患頭風空體灸之而愈性全僧性全號淨觀柁原氏自雲和氣氏之族學醫于丹波氏極其底蘊嘉元中據病源候論之目取捨衆說抄録單方著頓醫抄五十卷正和中又輯録唐宋醫方著萬安方六十二卷子道全亦有醫名道全三世孫為長淳善承業門人中川氏傳其術著捧心方萬安方策尾有授源三冬景之語冬景蓋道全初名生西僧生西筑前人為香權宮學頭能醫著五體身分抄小松僧小松通稱悲阿彌文和中後光嚴帝弗豫悲阿彌奉藥以功敘法印有鄰僧有鄰號壺隱菴居南禪寺貞治中本於梵綱經著福田方悲田方壽阿彌僧壽阿彌醫名隆於京師應永二十九年後小松帝弗豫壽阿彌奉藥而痊賞賜金飾佩刀及物品三十二年帝暴下血屢暈絶時醫束手及壽阿彌上藥帖然復常允能僧允能稱三位阪士佛之孫醫術俊拔敘法眼正長元年稱光帝病傷寒丹波幸基及壽阿彌皆難其治上皇乃命允能進方旦日熱大減漸次消息而愈永享三年將軍足利義教疾允能又治之效輯録家傳七十二方名曰琉璃壺良心僧良心信濃人父秦久秋為左近將監良心善調藻又知醫方文明五年受畠山義統命赴朝鮮傳和丹二氏所曾用癰疽八穴灸法及神應經於彼而還久阿彌僧久阿彌永享嘉吉間以瘍醫行瑞筠僧瑞筠號玉窗竹田定俊之子住相國寺亦通醫術一立僧一立享祿中以醫顯著典藥拔書景贊僧景贊永祿中著鑑效祕要方澄一僧澄一號慈濟軒著方書六卷源貞僧源貞天文中著精選祕用方不孤僧不孤稱鄰藏主號卜庵長享中以馬醫行於京師及鎌倉門人四宮四郎天外狂翁得其傳不孤又精刺擊通音律祐公僧祐公號蓄秀軒住攝津極樂院禪余醫治為事高定僧高定字圓俊竹田快翁之子從僧慈心居藥師寺內攻釋教外行醫術頗有精良稱后土御門帝及後柏原帝弗豫每召奉藥賞賜觴及寶刀雪岑僧雪岑稱安公從上池院定國學醫頗行於時三喜月湖僧三喜稱導道號支山人又範翁河越人姓田代父兼綱冠者信綱之後也初入妙心寺參禪又就足利校主利陽學醫後入明受李杲朱震亨之術於月湖及恆德孫留學十二年業成而反居鎌倉江春庵又居下總古河世稱古河三喜子孫傳其業襲稱田代江春月湖稱明監寺又號潤德齊不知何人求法入明寓於錢塘以醫行明景泰三年著全九集六年又著濟陰方三喜著有當流和極集捷術大成印可集諸藥勢揃藥組並諸療方夜談義諸病禁好集直指篇醫案口訣等阪上池院室町氏之時上池院壽命院竹田法印等皆世為尚藥御醫與和丹二氏相抗衡稱曰五家典藥云阪慧勇通稱士佛號健叟姓源賴光五世孫充角始以阪為氏世居大和至祖九佛徙於京師以醫行父十佛傳業敘氏民部卿法印慧勇醫術超卓於父祖賜號上池院比之於盧扁也將軍足利義詮眷顧極渥嘗謂之曰士字從十從一子術超越父祖從今宜稱士佛於是改名內野之役從焉將軍有疾命藥士佛作必勝散以進既愈而軍亦有利將軍喜甚子祖胤通稱起宗襲號上池院應永十六年五月將軍在北山殿患傷寒祖胤與父議以大黃黃芩芍藥半夏厚朴甘草等下之更進麥門冬湯而愈子大勇字子勇繼職仕室町幕府子胤祐通稱嘉邦慧勇至胤祐併為民部卿法印子宗精通稱進月為將軍義政之醫官屢奏效子龍護通稱定國號樵云齊子紹胤通稱光國將軍在穴太疾紹胤與和氣明英往而療之子貴祐忠存貴祐通稱惟天仕織田氏及豐臣氏後從神祖于軍中著上池院日記忠存稱法常坊居京師北賀茂子宗仙號洞庵慶長十三年始謁神祖後擢醫官宗仙二子壽仙通稱三益族幽玄通稱壽三亦仕幕府阪盛方院阪淨秀父淨快士佛次子幼而穎敏善家技邃方書有出藍之目士佛恐其名壓兄固禁為醫淨快不從士佛怒逐之出居近江阪本後將軍有篤疾不差召淨快治之稱光帝弗豫亦命上藥以功奏敘二位法印選祕方二十八劑以傳於家淨秀敘宮內卿法印嘉吉二年十月後花園帝病癰疽淨秀與丹波賴豐共掌御藥寶德元年八月帝病腹痛淨秀上藥頓愈賜號盛方院子孫襲稱焉淨秀著有鴻寶祕抄子淨孝敘法印淨孝盡心疾疢嘗嘆厲風難治詣因幡堂懇祈藥師佛一夜夢授靈方乃以其方治之莫不效著揖仙方子淨喜敘宮內卿法印將軍義尚有疾療之愈著直濟方子淨運奉後柏原帝御藥敘法印明應中赴明學張仲景方法歸朝名益顯因幡守山名某嗜醫就而求方淨運取父所撰增補之名曰續添鴻寶抄以與焉又別著遇仙方八卷新掎方三十一卷子淨見亦有學術著增損附益抄子淨盛子浮忠併為侍從宮內卿法印正親町帝弗豫淨忠掌御藥足利氏亦信重之著家祕小雙紙子淨勝仕織田氏著達源方二十二卷子淨慶仕豐臣氏子淨珍慶長中謁神祖為醫官淨勝至淨珍皆為三位侍從法印子淨元療獻廟疾有效擢侍醫徙於江戶子孫改姓吉田吉田氏吉田德春號仁庵本姓佐佐木曾祖嚴秀食邑于吉田因為氏德春以醫仕室町幕府敘法印晚年致仕居嵯峨角倉故子孫或氏角倉子宗林繼職敘宮內卿法印子宗忠號濟舟子宗桂號靖節最能辨藥性世人稱曰日華子天文中與僧策彥遊於明者再治明主世宗病及歸世宗賜以顏輝扁鵲圖聖濟總録及藥笥等明人欽其術曾號曰意庵取諸醫意之義云故後又通稱意庵敘宮內卿法印子宗恂襲稱意庵號又玄子嗜學與藤原肅友善仕豐臣秀次敘法印後陽成帝弗豫上藥奏效因敕改稱意安進民部卿法印後謁神祖賜祿五百石時洋舶始獻珊瑚枝神祖手摸其形普問諸醫無有知者獨宗恂以為珊瑚枝詳言其産所及取採之方神祖嘉賞就賜以一枝後又貢異物質如石而薄長一尺余如木賊柏葉相連綴者亦以問宗恂對曰恐是柏枝瑪瑙花也徵之於本草綱目果是也又命制紫雪於是恩遇異於他每歲賜藥石及金銀衣服不資子宗達後改吉皓襲稱意安敘法眼亦精藥性臺廟時數療篤疾輒有成績宗恂著有素問講義難經注疏增補醫經小學藥性纂類本草序例抄醫方大成論抄名醫傳略古今醫案等宗達著有吉田氏方本草倭名醫學類聚等竹田氏竹田昌慶號明堂又實乘僧都姓藤原大政大臣公經子兄公定後光嚴帝時坐緒仁親王事得罪屏居於采邑竹田昌慶從焉因為氏後遇赦歸京師敘山城守性勇武眼有重瞳數日從軍既而屈節讀書遂好醫方應安二年航明講術就名醫金翁者力學十年金翁深愛其才妻以己女生二子明主大祖後産難瀕危延昌慶治之藥未終劑太子已免明主大喜封安國公永和四年得醫家祕書及銅人形等而歸後圓融帝弗豫昌慶奉診有功任左衛門督康歷二年削髮敘法印子直慶善慶昭慶直慶為左衛門督善慶應永十九年治後小松帝弗豫有效敘法眼後進法印任治部卿改名善祐昭慶後改定盛通稱快翁敘宮內卿長祿應仁間屢治足利氏疾進法印麑島候有疾請醫於京師幕府命昭慶往而療之醫名益彰昭慶博學多能世稱為十能之士著延壽類要子宗慶秀慶宗慶後改宗怡敘法印秀慶一名月海世傳月海雜録子宗圭一名清譽號了光敘法印子定加一名光英號雄譽元龜二年正親町帝患痢定加奉藥驗敘法眼天正九年宮女罹瘧衆治無驗定加與藥一劑而差進法印織田氏豐臣氏以其良工皆異待之子定白定宣定白號永應齊敘法印大阪之役在城戰死定宣承家後仕神祖為醫官久志本氏久志本常任稱兵部少輔天牟羅云命之後也世為伊勢祠官居久志本鄉因氏焉常任善醫世稱曰神宮醫永保中白河帝亦有敕旨子孫相承旁事刀圭其孫常辰敘丹波守子常光敘周防守父子俱為織田氏客天正十年常光始謁神祖於安土後擢為醫官徙於江戶弟常真嗣家職敘伊豆守子常顯敘左京亮天正中神祖在參河苅屋病瘧治未見效常顯適應闢而至即進神仙解毒丸速愈神祖賞之亦以為醫官子常範慶長中療臺廟寒疾速愈亦醫名子孫今皆繼職常辰著有奧義集家傳通外山野集藥林撰集服餌要集醫學色葉五急活法常光著有管蠡備急方同筆灸診抄安藝氏安藝守定其先出於安藝平氏因氏焉善女科延文中室町幕府室紀良子娠矣療之舉男是為將軍義滿因割其邑封之又奏為尚藥嘉慶中敘從四位上任大膳亮子孫繼業宮中治産皆屬於安藝氏初守定詣春日祠通夜有祈時有一女子求治守定為施針與藥女病頓除喜而謝恩曰妾猿澤之龍女荷君厚惠無以為報妾有靈方願以相贈乃遺一卷去明早視之治産方也旁留龍鱗三片守定異之試其方莫不有驗遂得女科之名云子貞守刑部少輔子守家歷大膳亮刑部少輔永享中療幕府室重子産效乃賜作州弓削莊子守宣歷左京亮刑部少輔子守貞子貞德並左京亮子貞家歷左京亮大膳正天文中削髮曰宗榮子貞像子貞種並歷大膳亮左京亮子貞俊亦大膳亮天正中豐臣氏闢掌後宮醫藥其孫道受通稱好庵從曲直瀨道三而學承應中擢幕府醫考吉田宗桂孫長因稱大膳亮後敘宮內卿法印專療婦人不知與安藝氏同流耶姑書俟考板阪氏板阪宗頓近江阪本人以醫為業子宗德稱三位號大歇又湖隱軒為人豪縱而視疾入神寬正三年大內教弘在伊豫疾將軍憂之廣撰良醫宗德當選而往時人榮之子維順徙於京師擢御醫敘法印子備後入道子宗高通稱卜齊幼入東福寺為僧武田晴信知而惜之勸而還俗承繼家業宗高後遂仕武田氏永祿戊辰秋晴信有病宗高診曰微恙似不足患然數年後必發發則不可為請早計之晴信不可果如其言板阪宗慶著家珍方板阪釣閒著家傳小兒方疑皆同族祐乘坊祐乘坊義存將軍惟康親王之子親王罷職歸京師義存乃生於鎌倉其母育之貧甚僧疏石見而憐之收為徒弟名曰祐乘坊後業賣藥世所傳磨積丸是也子孫遂以祐乘坊為稱義子空從北條仲時往京師初學佛後為醫終以醫顯貞治三年徵診御脈敘民部卿三位法印將軍足利義詮最相親信每屬之治子瑞景從丹波氏而學術絶等倫任典藥頭時丹波氏宗適斷嗣元日屠蘇調進有闕應安五年幕府使瑞景代獻後以為例子宗琇後改琇存賜號披壽院敘治部卿子宗安襲稱披壽院子瑞兆亦敘三位法印宗安又養上池院紹胤子瑞碩為子後改紹碩子瑞昌琇存至瑞昌五世任典藥頭子瑞久敘法眼子瑞翁襲稱宗安瑞翁著有胃氣辨緊要方灸治口訣肥肉傳藤原永全藤原永全字安世遠祖曰劉伯陽垂仁帝時歸化其孫春平奉使於西土始傳圍棋至在存以勇略著討賊有功天智帝賜姓藤原永全其後也資性穎異最邃醫學古今方書無不通曉他陰陽浮屠國歌皆涉其流一時緇素韻士感就講習嘗奉朝命赴明醫名益顯中臣成宗中臣成宗延應二年任右兵衛醫師成田小三郎成田小三郎阪東人初為院雜職元弘之役後醍醐帝幸笠置小三郎以醫術供奉遂從西狩帝之潛出隱岐小三郎往說名和長年唱義勤王恢復之業與有力焉八阪崇譽八阪崇譽通稱大進以名醫聞後花園帝時敘法眼子孫承業松井正濟福富氏松井正濟寬正文正間以醫仕室町幕府敘宮內卿同時有福富氏亦以醫顯高橋英全高橋英全受業於八阪崇譽之孫頗有聲譽文明中敘法眼英全於寇氏本草衍義凡例取要語常以自針曰凡為醫者須略通古今粗守仁義絶馳騖能所之心專博施救拔之意如此則心識自明神物來相又何必戚戚治名齪齪求利也如或不然則以致姜撫沾譽之慚曷逋華他矜能之戮乎世傳以為醫家坐右銘山科景紹山科景紹從竹田定盛學醫最單志本草航海就明醫研究齎良藥多種而還南條宗鑑南條宗鑑伯耆人少壯遊於京師又之丹波就名醫如意庵而學後從越前人一柏質疑義著撮要集若干卷術遂顯於世無子養從子宗虎為嗣宗虎又稱一鷗亦善醫豐臣氏闢為醫官請於朝敘法眼田村長元田村長元與丹波氏同宗世居丹波長元始徙於京師千本擢御醫世稱千本典藥子宗圓子長久子長慶子長昌子宗仙皆相承業宗仙尤名應北條早云闢赴相摸子長榮通稱安棲軒繼仕北條氏子長傳神祖闢為醫官子長頤子長祗並敘法印以安棲為通稱金持重弘金持重弘好學精醫最妙於針灸術天文中承大內義弘命赴明寓於嘉賓館有年醫院諸工服其技臨歸尚藥俞璉作文贈之片岡晴親片岡晴親天文中任大和守以醫仕室町幕府後與諸醫同侍於穴太營曾谷慶祐子壽仙曾谷慶祐稱半閒軒閭翁世業瘍科至慶祐從和氣真長學大方脈兼善內外治子壽仙通稱洞庵後襲父稱天正中療豐臣太閣腫瘍而驗敘法印慶長十六年後陽成帝久患潰瘍及壽仙上藥卒痊賜號慶法院後著外科傳語以奏帝大善之御筆題簽又詔右府今出川公為撰序當世榮之子宗祐通稱伯安後襲稱慶法院寬永七年闢為幕府醫官奈須家之奈須家之通稱宗圓父式部少丞家恆護良親王之孫有故冒奈須氏明應中以瘍科聞補藏人遷式部丞子重恆稱圓清又與三療幕府寵臣朽木牧齊墜馬傷速愈將軍義輝賜書賞之子重貞承家學仕神祖子恆昌通稱玄竹學於曲直瀨正慶以大方脈顯任民部卿號久昌院慶安三年閣老堀田候正盛疾殆幕府命恆昌療焉恆昌一匙起之候大喜謝以千金不受事聞於上上亦賞賜千金天下稱為優典恆昌著有醫方聚要藥方彙纂等阿佐井宗瑞阿佐井宗瑞和泉人精於女科世稱曰阿佐井婦人醫大永初得醫書大全刊公於世醫書刻板以此為始佐佐木善住佐佐木善住秀義孫精於醫術一時生徒多聚其門土岐宗璉土岐宗璉字明嚴岐阜著族好醫方救活不鮮族人受其方為醫者數人敦山通稱長元光隆通稱龍安俱出仕幕府河野治傳河野通繩通稱治傳初稱傳治伊豫人父通信為豐太閣滅舉族戰死傳治遁為醫倒名曰治傳從筑前候隆景赴朝鮮得三因方而歸試業於長崎後徙京師子通幸通稱松安號良仙承父業聲譽元和六年擢幕府敘法印岡家重岡家重一名元春稱彌傳次仕浮田秀家食祿千石後削髮禰道和以啞科行於京師子元勝通稱智庵承業子元安辭家以二子壽元為嗣壽元通稱甫庵亦有醫名為幕府醫官津輕以三津輕以三本姓大河內氏兵庫頭政親之孫參河人從松下道慶學瘍科子建廣稱左馬頭初仕北條氏政後辭祿歸而承父業嘗療本多候正信發背效擢為幕府醫官笠原重次笠原重次通稱與三郎號宗室堺人以眼科聞稱曰穗積流中世目醫有佐佐木青木須磨馬島數家穗積亦其一皆舊傳也重次寬丞中擢為幕府醫官子宗印號養琢子重吉一作武重子重元通稱養仙號嶺云傳業三折全友三折全友尾張人以醫行於京師近藤桂安近藤桂安丹波人精小方脈出居京師治效赫著世稱丹波兒醫後光明帝髫齓時屢召其劑及即位特敘法印賜號壽伯院
