body:
  text: 前編卷中和氣氏桓武帝時名醫有和氣廣世後二百餘年有丹波康賴二氏世職名播外國可謂官有世功者矣和氣廣世備前藤木人其先出於垂仁帝父清麻呂民部卿兼造宮大夫美作備前國造廣世好學補文章生延歷四年坐事禁錮無幾特旨除少判事自式部少輔轉典藥頭又命兼大學頭以專督生徒課試廣世乃遷宅於大學寮南造弘文院置書數千卷又自著藥經大素等以誘掖後進納墾田三十町以助學資其篤於所職如此歷官美作守式部少輔而大學頭如故廣世無子弟真綱生真典子時雨時雨從宮忠來受方術夙有聲譽承平三年試左兵衛醫師天慶中為侍醫纍遷針博士醫博士天曆十年擢典藥頭子正業正世正業為侍醫權針博士進典藥頭子致賴相法致賴為典藥頭醫博士兼攝津守子元倫歷典藥頭兼式部少掾長門守等正世歷醫博士典藥頭療為章親王癰腫效賞賜綾帛一條帝歷稱一時人材曰醫方則丹波重雅和氣正世正世生相成相茂而以侄相法為嗣相法針博士侍醫子相賢章親相賢右兵衛醫師章親一名親平又曰義親典藥允子相世成貞相世左兵衛醫師子成世左近衛醫師左京亮子定世定一作貞相賴盛宗定世侍醫兼內藏助阿波介相賴右近衛醫師盛宗左近衛醫師相成典藥頭子相秀相任相秀權侍醫子相忠延忠相忠歷左衛門醫師典藥允侍醫子秀成權侍醫兼采女正一女子生而前陰無竅乞治於安倍盛親盛親惶惑不能下手秀成以刀割破遂得為常人子秀忠典藥允針博士相任右近衛醫師子信經子賴政並從五位下延忠從五位下相茂歷典藥醫師針博士侍醫或云本惟宗氏以正世外孫冒其姓子永保侍醫子保世五位下成貞典藥允醫博士成貞最名子憲貞貞相憲貞號和三典藥允子相正相時盛世相正典藥允子相重相永二人從丹波重基而學相重左兵衛醫師盛正左京權亮貞相歷左京亮采女正子兼相相清定成兼相歷內藏助丹波少掾子兼業從五位下藤原兼實曰貞相兼相為良醫然不用於世可惜矣相清典藥允相時左京亮子相元相保相光相元歷相摸介左京權亮承安四年紀伊守某在任病請治相元往療之子相家子相貞皆從五位下相永曆右兵衛醫師典藥助醫博士無子養中原貞說為嗣貞說從貞相及丹波重長而學為人豪放好大言族人目為狂不肯許其冒姓會宇佐祠官有疾時醫以為癩律禁惡疾奉祭祀將奪其職懼赴京師請使廷醫論定己疾貞說亦與焉衆醫診畢退而呈案貞說曰吾貧人也家無方書退案何為即席書狀以為祠官疾白癜非癩考徵精確衆莫能難祠官賴獲不廢矣二條帝大賞之特賜和氣氏補諸陵頭安元二年後白河上皇患瘡丹波憲基傳鹿角大黃類荏苒不差又將灸之貞說診曰此小瘡何用灸為臣有小膏貼之愈不出三日矣上皇命獻之果如其言治承二年轉長門介亡幾卒子貞經貞村貞經歷權侍醫醫博士兼采女正內藏助等文曆元年四條帝患腳氣腫及大腹證候甚惡諸醫勸灸貞經獨以為不可帝卒弗用灸而愈子貞利貞宗貞衡貞基貞幸有貞貞尚貞利右近衛醫師貞宗建仁三年擢侍醫兼歷采女正駿河權介左兵衛醫師等子貞光貞兼貞光歷主殿介權針博士典藥介貞兼大學權輔貞基權侍醫典藥助子貞朝典藥助兼大膳權亮貞幸典藥權助兼內藏助藤原定家年老患中風貞幸治之得全子貞親貞茂兼仲貞親歷圖書頭隼人正大炊助女醫博士針博士等右貞左京亮承久三年後為羽上皇隱岐之狩從焉貞尚子貞並從五位上定成歷醫博士侍醫典藥頭兼織部正近江權大掾因幡介丹波介等仁安二年鳥羽上皇病瘍丹波重長療之不差定成乃詳病狀變遷及消息之方奏之上皇納之卒有效承安二年高倉帝患瘍定成和麥門冬大黃散貼之有效安元中侍大後病於熊野行宮亦有效養和元年奉敕著合藥方和氣氏中世被藤原氏抑制衰微不振雖有良工遂無聞焉及至定成醫名隆起官爵超父祖稱為中興子定長定良時成正基定康定親定長曆女醫博士權侍醫兼諸陵頭參阿權介美作權介主稅寮等定良有才學因平清盛請著醫方抄養和元年敕當時名醫五人撰方書定良與焉別著療治方歷諸陵頭備中介相摸介子定雅長成定雅稱藥院入道長成歷權侍醫施藥院使典藥介兼丹波大掾等晚削髮曰寂信寬喜二年東一條大後弗豫召診寂信曰原病雖平水氣將發恐難為矣既而果然子忠成師成清成師有忠成歷典藥允主計頭修理權亮等子忠有師成歷侍醫典藥允兼織部正主計頭等文永九年與種成同侍後嵯峨上皇弗豫有功後與丹波忠茂俱療春宮疸病子成繼清成筑前守師有歷典藥權介主稅助等定親歷醫博士針博士圖書頭隼人正等時成歷侍醫典藥頭兼丹後介織部正等建久二年中宮喉痹時成針之而愈七條大後弗豫時成灸之而愈元久二年後鳥羽上皇弗豫時成藥治之而愈承元二年大後病腳氣困悶極矣時成灸之而愈藤原定家腰痛尉之增劇時成診曰此濕浸腰也治屬腳氣非火尉之所宜乃作湯藥浴之而愈子基成清成親成知成氏成基成歷侍醫典藥頭內匠頭等子能成宗成能成歷下總權介侍醫主計頭等貴戚有疾醫為處方中有樟柳根人不知為何物問能成能成曰商陸一名樟柳人服其家學有素正嘉元年後深草帝弗豫御能成藥而愈子成繼以成以成侍醫兼能登介子康成侍醫宗成歷玄蕃頭大藏少輔等子冬成歷侍醫下總權介縫殿頭采女正等子理成歷采女正圖書頭正基歷權醫博士侍醫兼主殿助織部正等或患腳腫正基用火針治之子有成歷女醫博士典藥介兼玄蕃頭進侍醫建長七年奉後鳥羽上皇藥有效賜良馬及物子遠成季成泰成遠成擢侍醫轉周防守季成歷針博士典藥權助兼伯耆介等泰成權醫博士子連成亦權醫博士定康為女醫博士藤原定家病瘍不差定康以鹿角屑貼之即愈子光成顯成光成歷女醫博士典藥頭兼圖書頭等顯成典藥權介子直成歷典藥權介醫博士兼縫殿頭等清成歷侍醫典藥頭圖書頭子尚成賴成尚成侍醫兼大膳亮子弘成歷典藥少允侍醫圖書頭等子藤成歷侍醫兼采女正三河權介等賴成典藥少允兼三河權守子利成玄成富成利成三和權守子晴成治成晴成織部正治成但馬權守富成歷典藥助大舍人頭親成典藥權介兼織部正後削髮曰淨觀僧覺寬咽喉腫塞七八日滴飲不下煩悶瀕死淨觀為刺其喉出膿升余立愈子伊成種成彌成親時員成伊成歷木工助丹波大掾子經成歷典藥權助女醫博士大舍人頭織部正等子篤成歷典藥頭大膳大夫彈正大弼等特受花園上皇寵彌成從五位上知成歷典藥權助越前介內匠頭縫殿頭等子為成蔭成國成夏成常成為成歷女醫博士侍醫典藥頭甲斐守等子仲種明成仲種典藥權助蔭成歷權針博士典藥助縫殿頭長門權守等子時名章成仲成時名針博士子時夏權針博士章成典藥權助子彌成侍醫兼三河權守仲成歷醫博士典藥權介施藥院使丹波介長門守宮內卿等貞和元年後醍醐上皇弗豫仲成與丹波知長治之進階賜良馬及服國成典藥少允兼三河權守子全成典藥頭兼大膳大夫正和中屢奉御藥夏成歷權針博士權醫博士兼丹波權守施藥院使大膳大夫等子英成針博士兼修理大夫正和三年伏見上皇患痘瘡英成與丹波長直侍診有效賜馬及服子益成致成益成歷侍醫典藥頭兼宮內卿子匡成繁成廣成匡成施藥院使兼彈正大弼子房成典藥權介兼左京權大夫子有成治部大輔繁成典藥頭兼彈正大弼廣成典藥頭施藥院使氏成歷典藥允侍醫兼丹波大掾玄蕃頭圖書頭等文永十年春宮病黃疸氏成與春成調御藥愈各有賞賚將軍藤原賴經有疾請醫於京師氏成當選而往子仲成利成蔭夏仲成典藥權助兼主殿介子久成岑成久成侍醫岑成權侍醫利成典藥權介蔭夏典藥權助子成綱仲知成綱典藥權介子仲尚歷權侍醫兼左馬頭典藥大允隼人正等子繁氏丹波守仲知針博士兼伯耆權介種成歷侍醫醫博士典藥權助兵庫頭等後嵯峨上皇使種成及惟宗時俊文宿直種成尤被寵遇每御其劑上皇崩後削髮曰佛種子春成延成仲景春成侍醫縫殿頭文永中春宮病黃疸春成與氏成奉藥有效延成侍醫仲景歷權女醫博士典藥頭大膳大夫隼人正等晚削髮曰景覺子弘景音成嗣成弘景歷女醫博士隼人正圖書頭等晚削髮曰覺種僧虎關疾室町幕府特命覺種治覺種無子以嗣成為嗣嗣成歷典藥權介施藥院使兼下總權介典藥頭侍醫等足利直義夫人體氣異常詢治於醫諸醫或以為風或以為氣紛紜不決嗣成診曰此妊也非疾也何以藥為諸醫詬曰甚矣嗣成之為諛也夫人原乏生育今齡逾四旬豈復有孕理既而果舉男矣直義大喜割其邑以報之子全繼典藥頭彈正少弼音成權針博士織部正員成侍醫兵庫頭子時定時通房成時定權侍醫時通侍醫玄蕃頭房成侍醫兼肥前介織部正子時員權侍醫大舍人頭常成歷權女醫博士侍醫兼宮內少輔播磨權守典藥頭施藥院使大膳大夫兵庫頭等常成家藏萬卷嘗患兵燹請納於祕庫亡幾祕庫災纍世方書蕩無遺燼世深惜之常成無子養從子明成為嗣歷侍醫典藥頭施藥院使兼宮內少輔甲斐權守右馬權頭刑部卿等子茂成後改明茂歷侍醫典藥頭兼大監物宮內卿等晚削髮曰常茂子尚成後改時尚歷權侍醫治部少輔宮少輔無子養丹波明重為嗣明重伎名蜚著歷施藥院使典藥頭兼甲斐守晚削髮曰宗鑑號半醒軒敘從三位子明孝歷施藥院使權侍醫典藥頭兼甲斐守宮內少輔兵庫頭治部卿等晚削髮曰宗乘敘正三位子明名權侍醫施藥院使從三位致成典藥頭子邦成良雨邦成歷典藥頭施藥院使兼宮內卿等子保成施藥院使良雨子茂成皆典藥權助利長本明重門人明重愛其才以為義子任刑部少輔晚削髮曰道三子明親後改真長削髮曰證玄號蘭軒後敕稱春蘭軒永正中航海赴明從熊宗立學醫子明英歷兵庫助宮內大輔修理大夫等以治皇女之功進從三位晚削髮曰壽林號閒潚軒壽林家於施藥院之故地有大井界為二一供醫事一充家用因號曰半井而子孫遂以為氏子明親明貞明親通稱機庵任宮內大輔子瑞策初名光成通稱驢庵又稱通仙軒任宮內大輔瑞策醫術越於父祖正親町帝嘉之因其自稱敕賜號通仙院又以祕庫所藏丹波康賴醫心方賜之特班諸醫上織田豐臣二氏皆善待之信長在京師常館其家有近江人某聞其能試使診己瑞策曰子身無所病而脈見死候恐有不虞之事子其慎之明日果死於軍世以為神時曲直瀨正慶術重於時而瑞策與之齊譽云子瑞桂後改任世亦稱驢庵神祖在駿府召而見之又見臺廟於江戶後水尾帝敕襲父號通仙院子瑞壽亦稱驢庵數療猷廟疾每奏奇效恩寵無比加祿至千五百石時幕府醫官皆削髮敘法印法眼惟瑞策特請復祖先爵位故至今子孫仍之門人清水瑞室江藤宗元山下宗琢皆任幕府瑞室尤著聲績丹波氏丹波康賴丹波矢田人其先出於漢靈帝靈帝五世孫曰阿智王應神帝時避亂率母子及其黨七人歸化帝封之於大和國檜隈郡以為使主其子都賀改賜姓直有二子山木志努志努別賜族阪上出居丹波國子駒子子弓束子首名子孝子子大國康賴大國子學醫其術特精賜姓丹波宿禰歷宮針博士左衛門佐兼丹波介天元五年著醫心方三十卷其書捃托隋唐方書百餘家每門發以巢元方病源候論而主療諸方次之至於本草藥性明堂孔穴養生