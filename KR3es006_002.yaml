右近衛醫師中原則氏寬元三年任右近衛醫師寶治元年轉典藥少允中原保職寶治元年任典藥少屬中原貞良弘長二年任左近衛醫師中原有雅元弘二年任典藥少屬中原有信元弘元年任典藥少允小槻氏小槻為信長保三年任施藥院史生小槻忠任保延元年任典藥大屬小槻忠辰康治中歷右近衛醫師典藥少允小槻宗久元久二年任右近衛醫師小槻宗重仁治三年任典藥權大允菅原氏出雲刀子為典藥大屬天平十七年擢內藥正侍醫出雲島成延歷三年任侍醫出雲廣貞攝津人精方術為侍醫兼中內記美作權掾內藥正信濃權守等延歷二十四年帝弗豫廣貞與吉水神德奉御藥以功進爵一等大同三年奉敕與安部真直撰大同類聚方又別蒙命依唐制定藥升大小之量又著難經開委子峰嗣初事淳和帝於潛邸帝為申請補醫得業生獲試及第醫置得業生自此始矣及帝即位纍遷左兵衛醫師醫博士兼內藥佑侍醫春宮坊主膳正尾張權介美濃權介越後守播磨介典藥頭攝津守等以王府之舊寵顧絶人雖帶遠任未嘗赴官與一時名流同選金蘭方又注針灸法奏進貞觀元年奉敕赴備中採石鍾乳峰嗣以與出雲土師同祖請改稱菅原後紀出雲永嗣任左衛門醫師蓋同族也菅原梶吉攝津人出居於右京天長八年任侍醫承和元年與梶成同賜姓朝臣九年兼肥後介菅原梶成右京人達練醫術承和初特擢為遣唐知乘船事赴唐質醫經疑義六年事畢而還遭風漂到南海遇賊劫剽死者數人梶成等拒鬥甚力僅獲免修補破船歸達大隅太宰府以聞下敕符曰遣唐知乘船事梶成等分駕一隻小船漂入異域萬死獲生其苦節誠可矜恤其加慰勞梶成獻所獲兵器五尺鋒一片蓋鞘橫佩一箭一十年任針博士尋進侍醫菅原行貞延長三年任典藥頭菅原道數延長三年任侍醫菅原茂滋天曆中歷右兵衛醫師權針博士近江少掾菅原為名天曆中為左衛門醫師兼醫博士菅原行仁天曆中侍醫博士菅原典雅長和長德間歷針博士典藥頭兼但馬權頭造酒正伊豫介菅原雅行永承二年任左兵衛醫師菅原宣忠是綱子大治五年任典藥助菅原盛信仁安元年任典藥允安倍氏安倍真直歷衛門佐大舍人助相摸介纍遷少納言左近少將奉敕與出雲廣貞等撰集醫方一百卷大同三年五月書成奏進名曰大同類聚方此為本邦方書之鼻祖也安倍濱成典藥頭敘從五位下安倍基尚延喜初為典藥允安倍盛親圓弼子受丹波雅忠術寬治中歷典藥允侍醫兼采女正丹波介等永久二年秋大納言宗通病癰劇盛親診之即先以針挑瘡口射水去膿二三日次加艾灸亡幾收功子盛親歷采女正典藥少允侍醫子親良保元應保間侍醫兼能登權介安倍忠尚延德二年敘正四位上紀氏大村直諸繩為丹波醫師天長元年四月給國稅四百束以充治病科大村直福吉丹波人承和元年賜姓宿禰以其武內之後也二年任右近衛醫師福吉最善瘍科當世無有及者仁明帝特賜宅一區以賞之後敕撰治瘡記紀東人仁壽二年任典藥頭齊衡三年轉伊賀守紀夏井美濃守善岑子身體雄偉溫雅有才識少善隸書承和中待詔於授文堂文德帝即位召見夏井敝衣敗履以進左右皆笑帝曰彼疲駿也非汝等所知擢少內記纍進右中辨機務明敏操志忠益帝愈重之會帝崩出為贊岐守政化大行任滿百姓詣闕哀請詔更留二年轉肥後守貞觀八年坐弟豐城纍竄於土佐夏井素知醫方其在土佐也自往山澤採藥合煉施人全活甚多一人中風被髮狂走夏井與之散藥一匕立愈紀春生初為僧曰惠靈住大安寺後歸俗承和三年為遣唐譯語兼但馬權掾貞觀中任左近衛醫師尋兼土佐權掾紀國守常陸介真人之子補侍醫內藥正以明醫聞東宮病痢國守進以芒硝黑丸且啓曰必至瞑眩然後見效既而煩悶欲絶執政疑其誤治執拘國守使衛士坐守若有不諱速斫之及東官急苦漸收病亦隨減卒如國守言然國守自是深自悔恨曰以術致死無為為醫遂誡子孫永停醫學紀常仁為侍醫貞觀十年兼越後守紀椿守春宮亮白滿子歷大內記典藥助上總介安房守越中權頭椿守善書外番降書每命書之紀當仁貞觀中為侍醫歷大膳亮左京權亮越後守等紀有行為典藥寮醫生紀兼後為典藥少允紀伊任寬印內供子以醫名傳云欽明帝十三年梁文帝贈針經帝賜其書於紀河邊多兔麿未得其術而死孫幾男麿入新羅學其術而歸皇極帝元年舉針博士是為針術之祖按皇國通於彼以隋大業中為始而云梁文帝蓋自百濟而獻之也其始置針博士及紀幾男麿世系未詳之因附記焉
